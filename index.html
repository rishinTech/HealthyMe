<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Healthy Me!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ================= LOGIN PAGE ================= -->
    <div id="loginPage" class="centered">
        <h1>Healthy Me!</h1>

        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>

        <button onclick="login()">Enter</button>
    </div>


    <!-- ================= MAIN APP ================= -->
    <div id="app" style="display:none;">

        <h1>Healthy Me!</h1>

        <!-- ================= TABS ================= -->
        <div class="tabs">
            <button onclick="showTab('bmiTab')">BMI</button>
            <button onclick="showTab('calorieTab')">Calories</button>
            <button onclick="showTab('progressTab')">Progress</button>
            <button onclick="showTab('historyTab')">History</button>
        </div>


        <!-- ================= BMI TAB ================= -->
        <div id="bmiTab" class="tabContent">
            <h2>BMI Calculator</h2>

            <select id="weightUnit">
                <option value="kg">Kilograms (kg)</option>
                <option value="lbs">Pounds (lbs)</option>
            </select>

            <input type="number" id="weight" placeholder="Enter Weight">

            <select id="heightUnit">
                <option value="cm">Centimeters (cm)</option>
                <option value="ft">Feet</option>
            </select>

            <input type="number" id="height" placeholder="Enter Height">
            <input type="number" id="inches" placeholder="Inches (if using feet)">

            <button onclick="calculateBMI()">Calculate BMI</button>

            <p id="bmiResult"></p>
            <p id="targetCalories"></p>
        </div>


        <!-- ================= CALORIE TAB ================= -->
        <div id="calorieTab" class="tabContent" style="display:none;">
            <h2>Daily Food Tracker</h2>

            <input type="text" id="foodName" placeholder="Food item">
            <input type="number" id="foodCalories" placeholder="Calories">

            <!-- Healthy / Unhealthy Selection -->
            <select id="foodType">
                <option value="healthy">Healthy</option>
                <option value="unhealthy">Unhealthy</option>
            </select>

            <button onclick="addFood()">Add Food</button>

            <div id="foodList"></div>

            <h3>Total Calories Today:</h3>
            <p id="totalCalories">0</p>

            <h4>Healthy Calories:</h4>
            <p id="healthyCalories">0</p>

            <h4>Unhealthy Calories:</h4>
            <p id="unhealthyCalories">0</p>

            <br>

            <a href="https://www.webmd.com/diet/healthtool-food-calorie-counter" 
               target="_blank">
               Check Calorie Information
            </a>

            <br><br>

            <button onclick="resetCalories()">Reset Today</button>
        </div>


        <!-- ================= PROGRESS TAB ================= -->
        <div id="progressTab" class="tabContent" style="display:none;">
            <h2>Daily Progress</h2>
            <p id="progressMessage"></p>
        </div>


        <!-- ================= HISTORY TAB ================= -->
        <div id="historyTab" class="tabContent" style="display:none;">
            <h2>History</h2>

            <input type="date" id="historyDate">
            <button onclick="viewHistory()">View</button>

            <div id="historyResult"></div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
